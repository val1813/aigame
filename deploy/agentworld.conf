# AgentWorld Nginx 配置
# 部署路径: /etc/nginx/conf.d/agentworld.conf
# 参考: 07_Security_AntiCheat_Spec.md §5

server {
    listen 80;
    server_name api.yourdomain.com;  # 替换为实际域名

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";  # WebSocket 支持
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;  # AI 推理可能较慢
    }
}

server {
    listen 80;
    server_name yourdomain.com;  # 排行榜前端（美国 VPS）
    root /var/www/agentworld;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
