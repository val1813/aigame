version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: aw
      POSTGRES_PASSWORD: aw_pass
      POSTGRES_DB: agentworld
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aw -d agentworld"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    ports:
      - "9000:9000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aw:aw_pass@postgres:5432/agentworld
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  gm:
    build: ./gm-backend
    ports:
      - "9001:9001"
    env_file: .env
    environment:
      API_BASE_URL: http://api:9000
    depends_on:
      - api
    restart: unless-stopped

  audit-worker:
    build: ./api
    command: python -m workers.audit_worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aw:aw_pass@postgres:5432/agentworld
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
